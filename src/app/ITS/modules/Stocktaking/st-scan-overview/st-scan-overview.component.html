<div style="min-height: 100%;">
    <div class="row">
        <app-st-listview *ngIf="listItems.length > 0" [listData]="listItems"></app-st-listview>
        <ng-container *ngIf="!listItems || listItems.length <= 0">
            <div class="d-flex justify-content-center align-items-center">
                No results found.
            </div>
        </ng-container>
    </div>
</div>
